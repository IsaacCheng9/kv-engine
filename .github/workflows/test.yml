name: Test

on:
  push:
  workflow_dispatch:

jobs:
  asan:
    runs-on: ubuntu-latest
    name: Tests (AddressSanitizer + UBSanitizer)
    timeout-minutes: 15
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Configure CMake
        run: cmake -B build -DSANITISE=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: cd build && ctest --output-on-failure

  tsan:
    runs-on: ubuntu-latest
    name: Tests (ThreadSanitizer)
    timeout-minutes: 15
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Configure CMake with ThreadSanitizer
        run: >
          cmake -B build_tsan -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build_tsan

      - name: Run tests
        run: cd build_tsan && ctest --output-on-failure
